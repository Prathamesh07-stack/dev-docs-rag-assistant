version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../config:/app/config
    environment:
      - ENV=development
      - DATA_DIR=/app/data
      - CONFIG_PATH=/app/config/sources.yaml
    depends_on:
      - chroma
    networks:
      - rag-network
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: rag-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
    networks:
      - rag-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  chroma-data:

networks:
  rag-network:
    driver: bridge
